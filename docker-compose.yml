version: '3.9'

services:
  db:
    image: postgres:16
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./db/seed/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - ecommerce_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:123456@db:5432/ecommerce_db?schema=public"
      JWT_SECRET: "vibecart_super_secret_2026"
    depends_on:
      - db
    networks:
      - ecommerce_network

  frontend:
    build:
      context: ./ecommerce-fe
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - ecommerce_network

volumes:
  postgres_data:

networks:
  ecommerce_network:
    driver: bridge